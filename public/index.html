<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ERO Operator Tools</title>
  <style>
    :root {
      --bg: #14171d;
      --panel: #1c2128;
      --panel-2: #11161c;
      --border: rgba(255,255,255,0.11);
      --text: #f2f4f8;
      --muted: #bcc6d4;
      --accent: #d9472f;
      --accent-2: #ffb068;
      --chip: #0f1622;
    }
    * { box-sizing: border-box; }
    html {
      width: 100%;
      overflow-x: hidden;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(217,71,47,.18), transparent 35%),
        linear-gradient(180deg, #181b22 0%, #13171d 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .app {
      width: min(1180px, calc(100vw - 24px));
      margin: 16px auto;
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      background: rgba(24,28,35,.92);
      backdrop-filter: blur(10px);
      min-height: calc(100vh - 32px);
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .app.map-mode {
      width: 100vw;
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0;
      border: 0;
      border-radius: 0;
    }
    .app.map-mode > .header {
      display: none;
    }
    .header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
      padding: 22px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(71,24,18,.5), rgba(28,33,40,.92));
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .brand-badge {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(180deg, #c53524, #8d2418);
      display: grid;
      place-items: center;
      font-weight: 800;
    }
    .brand h1 {
      margin: 0;
      font-size: 18px;
    }
    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }
    .header-nav {
      display: grid;
      gap: 10px;
      justify-items: end;
    }
    .header-actions,
    .header-utility {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
    }
    .header-btn, .search-btn, .link-btn, .save-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(10,14,20,.45);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
    }
    .header-btn.is-primary {
      background: rgba(217, 71, 47, 0.16);
      border-color: rgba(255, 176, 104, 0.24);
      color: #ffe0c2;
    }
    .header-btn.is-active {
      background: linear-gradient(180deg, rgba(217,71,47,.28), rgba(217,71,47,.16));
      border-color: rgba(255,176,104,.32);
      color: #fff5ea;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03);
    }
    .status-pill {
      border-color: rgba(116, 255, 173, .22);
      color: #74ffad;
    }
    .my-work {
      padding: 14px 22px;
      border-bottom: 1px solid var(--border);
    }
    .my-work h2 {
      margin: 0 0 10px;
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .saved-list, .day-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .field-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: end;
    }
    .select-input {
      width: 100%;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(30, 36, 44, .92);
      color: var(--text);
      padding: 13px 14px;
      font: inherit;
      min-height: 48px;
    }
    .saved-chip, .day-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 13px;
      border: 1px solid rgba(164, 192, 255, 0.18);
      border-radius: 999px;
      background: var(--chip);
      color: #a9c6ff;
      font-size: 14px;
    }
    .saved-chip.is-work-chip {
      color: var(--text);
      border-color: rgba(255,255,255,.14);
    }
    .chip-remove {
      appearance: none;
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      font: inherit;
    }
    .main {
      display: grid;
      grid-template-rows: 1fr auto;
      min-height: 0;
    }
    .composer {
      padding: 14px 22px 16px;
      border-top: 1px solid var(--border);
      background:
        linear-gradient(180deg, rgba(17,22,28,.74), rgba(17,22,28,.98)),
        radial-gradient(circle at right, rgba(217,71,47,.12), transparent 42%);
    }
    .composer form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
    }
    .composer input {
      width: 100%;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(30, 36, 44, .92);
      color: var(--text);
      padding: 15px 18px;
      font: inherit;
      min-height: 54px;
    }
    .live-map-view {
      grid-row: 1 / -1;
      padding: 0;
      overflow: auto;
      min-height: 100vh;
      min-height: 100dvh;
      background: #d9dde1;
      color: #101418;
      font-family: "Consolas", "Lucida Console", monospace;
      -webkit-overflow-scrolling: touch;
    }
    .today-board-view {
      padding: 22px;
      overflow: auto;
      min-height: 0;
      background:
        radial-gradient(circle at 15% 0%, rgba(255,176,104,.10), transparent 36%),
        linear-gradient(180deg, rgba(18,23,30,.98), rgba(13,17,23,.98));
    }
    .board-page-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 16px;
    }
    .board-page-head h2 {
      margin: 0;
      font-size: clamp(28px, 4vw, 54px);
      line-height: .95;
      letter-spacing: -.04em;
    }
    .board-page-head p {
      margin: 8px 0 0;
      color: var(--muted);
    }
    .board-page-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .board-stat {
      min-width: 92px;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 9px 11px;
      background: rgba(255,255,255,.025);
      text-align: right;
    }
    .board-stat .k {
      display: block;
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .board-stat .v {
      display: block;
      margin-top: 2px;
      color: var(--text);
      font-size: 20px;
      font-weight: 800;
    }
    .saved-paddles-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      align-items: start;
    }
    .saved-empty {
      border: 1px dashed rgba(255,255,255,.14);
      border-radius: 16px;
      padding: 18px;
      color: var(--muted);
      background: rgba(255,255,255,.02);
    }
    .ats-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0;
      padding: 8px 12px;
      border-bottom: 1px solid #aeb6bd;
      background: #e8ecef;
      color: #11161b;
    }
    .ats-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 128px;
      height: 36px;
      background: #d71920;
      color: white;
      font: 900 18px "Segoe UI", sans-serif;
      letter-spacing: -.03em;
    }
    .ats-head h2 {
      flex: 1;
      margin: 0;
      font: 800 22px "Consolas", "Lucida Console", monospace;
      letter-spacing: .03em;
    }
    .ats-clock {
      min-width: 145px;
      text-align: center;
      border-left: 1px solid #b8c0c7;
      border-right: 1px solid #b8c0c7;
      font-size: 13px;
      line-height: 1.18;
      padding: 0 12px;
    }
    .ats-state {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      text-align: center;
      font: 800 12px "Segoe UI", sans-serif;
      text-transform: uppercase;
    }
    .ats-state div {
      border-right: 1px solid #b8c0c7;
      padding: 3px 8px;
    }
    .ats-state strong {
      display: block;
      color: #11751f;
      margin-top: 3px;
    }
    .mimic-alert {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 7px 12px;
      background: #b90f18;
      color: white;
      font: 800 13px "Segoe UI", sans-serif;
    }
    .mimic-alert button {
      border: 0;
      border-radius: 4px;
      background: #f5f7f9;
      color: #1d242b;
      padding: 7px 18px;
      font-weight: 800;
    }
    .ats-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px;
      background: #d6dbe0;
      border-bottom: 1px solid #aeb6bd;
      font: 700 11px "Consolas", "Lucida Console", monospace;
      color: #1c252d;
    }
    .tool-cell {
      min-height: 20px;
      display: inline-flex;
      align-items: center;
      border-left: 1px solid #9aa4ad;
      padding: 0 10px;
      letter-spacing: .03em;
    }
    .zoom-controls {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      border: 1px solid #9aa4ad;
      background: #eef1f4;
    }
    .zoom-controls button,
    .zoom-controls span {
      min-width: 42px;
      height: 24px;
      display: inline-grid;
      place-items: center;
      border: 0;
      border-right: 1px solid #9aa4ad;
      background: transparent;
      color: #1c252d;
      font: 800 11px "Consolas", "Lucida Console", monospace;
    }
    .zoom-controls button {
      cursor: pointer;
    }
    .zoom-controls button:hover {
      background: #dfe5ea;
    }
    .zoom-controls button:last-child {
      border-right: 0;
      min-width: 50px;
    }
    .mimic-nav-btn {
      border: 1px solid #8e99a2;
      background: #f6f8fa;
      color: #111820;
      height: 24px;
      padding: 0 10px;
      font: 900 11px "Consolas", "Lucida Console", monospace;
      cursor: pointer;
    }
    .mimic-nav-btn:hover {
      background: #dfe5ea;
    }
    .tool-sep {
      height: 28px;
      width: 1px;
      background: #aeb6bd;
      margin: 0 5px;
    }
    .mimic-scroll {
      overflow-x: auto;
      overflow-y: hidden;
      background: #46515a;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
    }
    .ats-svg {
      display: block;
      width: 2720px;
      height: 430px;
      background: #46515a;
      font-family: "Consolas", "Lucida Console", monospace;
    }
    .ats-train-hit {
      cursor: pointer;
    }
    .ats-train-hit rect {
      shape-rendering: crispEdges;
    }
    .ats-train-hit:hover rect:first-child {
      stroke: #fff7b0;
      stroke-width: 2;
    }
    .ats-panels {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(220px, .65fr) minmax(260px, .75fr);
      gap: 6px;
      padding: 6px;
      background: #d9dde1;
      color: #12171d;
    }
    .ats-panel {
      min-height: 145px;
      border: 1px solid #98a2aa;
      background: #eef1f4;
    }
    .ats-panel h3 {
      margin: 0;
      padding: 6px 8px;
      border-bottom: 1px solid #aeb6bd;
      font: 800 13px "Segoe UI", sans-serif;
      text-transform: uppercase;
    }
    .ats-table {
      width: 100%;
      border-collapse: collapse;
      font: 12px "Segoe UI", sans-serif;
    }
    .ats-table th,
    .ats-table td {
      border-right: 1px solid #c6ccd2;
      border-bottom: 1px solid #c6ccd2;
      padding: 4px 6px;
      text-align: left;
    }
    .legend-row,
    .control-row,
    .note-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      font: 12px "Segoe UI", sans-serif;
    }
    .legend-swatch {
      width: 42px;
      height: 4px;
      background: #e8edf2;
      border: 1px solid #6e7880;
    }
    .legend-swatch.occ { background: #18bfc1; }
    .legend-swatch.blocked { background: #d20d17; }
    .ats-panels .ats-panel:nth-child(3) .note-row:nth-of-type(n+4) {
      display: none;
    }
    .live-map-error {
      margin-top: 14px;
      border: 1px solid rgba(255,176,104,.25);
      border-radius: 16px;
      padding: 14px;
      color: var(--accent-2);
      background: rgba(255,176,104,.06);
    }
    .search-btn {
      background: linear-gradient(180deg, #de4a31, #bc301f);
      border-color: rgba(255,255,255,.08);
      min-width: 108px;
      font-weight: 700;
    }
    .chat {
      padding: 18px 22px 20px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0;
      scroll-behavior: smooth;
    }
    .message {
      max-width: min(760px, 100%);
      padding: 18px 18px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(31,36,44,.92);
      white-space: pre-wrap;
      line-height: 1.45;
    }
    .message.intro {
      max-width: min(760px, 100%);
      padding: 20px 22px;
      background:
        linear-gradient(135deg, rgba(31,36,44,.96), rgba(17,22,28,.9)),
        radial-gradient(circle at left top, rgba(255,176,104,.08), transparent 36%);
      text-align: left;
      white-space: normal;
    }
    .message.intro strong {
      color: var(--text);
    }
    .message.user {
      align-self: flex-end;
      background: linear-gradient(180deg, #d9472f, #bd321f);
      border-color: rgba(255,255,255,.08);
    }
    .card {
      max-width: min(980px, 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      background: rgba(17,22,28,.95);
      overflow: hidden;
    }
    .board-card {
      max-width: min(1040px, 100%);
    }
    .board-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
      padding: 0 18px 18px;
    }
    .board-section {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(255,255,255,.025);
      overflow: hidden;
      min-height: 170px;
    }
    .board-section h4 {
      margin: 0;
      padding: 13px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--accent-2);
      font-size: 14px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .board-list {
      display: grid;
      gap: 8px;
      padding: 12px;
    }
    .board-empty {
      padding: 14px;
      color: var(--muted);
      font-size: 14px;
    }
    .board-item {
      appearance: none;
      text-align: left;
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 14px;
      background: rgba(17,22,28,.84);
      color: var(--text);
      padding: 10px 11px;
      cursor: pointer;
      font: inherit;
    }
    .board-item strong {
      display: block;
      font-size: 18px;
      margin-bottom: 4px;
    }
    .board-item span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }
    .today-board-view .board-grid {
      grid-template-columns: repeat(5, minmax(210px, 1fr));
      gap: 12px;
      padding: 0;
      align-items: start;
    }
    .today-board-view .board-section {
      border-radius: 12px;
      min-height: calc(100vh - 230px);
    }
    .today-board-view .board-section h4 {
      position: sticky;
      top: 0;
      z-index: 1;
      background: rgba(18,23,30,.98);
    }
    .card-head {
      padding: 18px 18px 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .saved-paddle-inline .card-head {
      position: sticky;
      top: 0;
      z-index: 3;
      background: rgba(24, 28, 35, 0.96);
      backdrop-filter: blur(10px);
    }
    .card-head-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .card-head h3 {
      margin: 0;
      font-size: 38px;
      line-height: 1;
      letter-spacing: -.03em;
    }
    .card-head p {
      margin: 6px 0 0;
      color: var(--muted);
    }
    .pill {
      border: 1px solid rgba(255, 176, 104, 0.3);
      color: var(--accent-2);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
    }
    .card-jump-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      background: rgba(9,12,18,.55);
      color: var(--text);
      width: 38px;
      height: 38px;
      cursor: pointer;
      font: inherit;
      font-size: 18px;
      line-height: 1;
      display: inline-grid;
      place-items: center;
    }
    .card-jump-btn:disabled {
      opacity: .45;
      cursor: default;
    }
    .card-body {
      padding: 0 18px 18px;
    }
    .active-box {
      border: 1px solid rgba(255,176,104,.25);
      background: rgba(255,176,104,.05);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }
    .active-box-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .active-box-copy {
      flex: 1;
      min-width: 0;
    }
    .active-box-jump {
      appearance: none;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      background: rgba(9,12,18,.55);
      color: var(--text);
      width: 38px;
      height: 38px;
      cursor: pointer;
      font: inherit;
      font-size: 18px;
      line-height: 1;
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
    }
    .active-box-jump:disabled {
      opacity: .45;
      cursor: default;
    }
    .active-box .label {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .active-box .title {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.15;
    }
    .action-mimic {
      margin-top: 14px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 180px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
    }
    .action-mimic .trip-stop {
      font-size: 15px;
    }
    .action-mimic .trip-time {
      font-size: 18px;
    }
    .action-detail {
      margin-top: 6px;
      color: var(--muted);
      line-height: 1.45;
    }
    .action-detail strong {
      color: var(--text);
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .summary-item {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255,255,255,.02);
    }
    .summary-item .k {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 4px;
    }
    .summary-item .v {
      font-size: 15px;
      font-weight: 600;
    }
    .card-actions, .day-actions {
      margin-top: 12px;
    }
    .day-btn, .save-btn, .link-btn {
      cursor: pointer;
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 8, 12, 0.74);
      display: grid;
      place-items: center;
      padding: 20px;
      z-index: 50;
    }
    [hidden] {
      display: none !important;
    }
    .modal {
      width: min(1080px, 100%);
      max-height: calc(100vh - 40px);
      background: rgba(24,28,35,.98);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: auto;
    }
    .modal-head {
      position: sticky;
      top: 0;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      background: linear-gradient(180deg, rgba(67, 24, 20, .85), rgba(24,28,35,.98));
    }
    .modal-controls {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .close-btn {
      appearance: none;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(9,12,18,.55);
      color: var(--text);
      width: 42px;
      height: 42px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
    }
    .jump-btn {
      font-size: 20px;
      line-height: 1;
    }
    .jump-btn:disabled {
      opacity: .45;
      cursor: default;
    }
    .modal-body {
      padding: 18px 22px 24px;
    }
    .entry-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      background: rgba(255,255,255,.02);
      margin-bottom: 14px;
    }
    .entry-card.active {
      border-color: rgba(255,176,104,.35);
      background: rgba(255,176,104,.06);
    }
    .entry-card h4 {
      margin: 0;
      font-size: 21px;
    }
    .entry-meta {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 10px;
    }
    .entry-lines {
      display: grid;
      gap: 6px;
      font-size: 14px;
    }
    .block-stack {
      display: grid;
      gap: 10px;
    }
    .trip-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 170px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
    }
    .trip-row.active-trip {
      border-color: rgba(255,176,104,.45);
      background: linear-gradient(90deg, rgba(255,176,104,.08), rgba(255,255,255,.02));
      box-shadow: 0 0 0 1px rgba(255,176,104,.12) inset;
    }
    .trip-side {
      min-width: 0;
    }
    .trip-side.end {
      text-align: right;
    }
    .trip-stop {
      font-weight: 700;
      font-size: 18px;
      line-height: 1.15;
      color: #f7f8fb;
      overflow-wrap: anywhere;
    }
    .trip-time {
      margin-top: 4px;
      font-size: 24px;
      font-weight: 800;
      color: var(--accent-2);
      letter-spacing: -.03em;
    }
    .trip-center {
      display: grid;
      gap: 8px;
      justify-items: center;
    }
    .trip-duration {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
    }
    .trip-rail {
      position: relative;
      width: 100%;
      height: 18px;
    }
    .trip-rail::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 3px;
      border-radius: 999px;
      transform: translateY(-50%);
      background: linear-gradient(90deg, rgba(169,198,255,.18), rgba(255,176,104,.35), rgba(169,198,255,.18));
    }
    .trip-train {
      position: absolute;
      top: 50%;
      left: var(--train-progress, 50%);
      transform: translate(-50%, -50%);
      font-size: 16px;
      filter: drop-shadow(0 0 8px rgba(255,176,104,.22));
    }
    .trip-subtext {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }
    .entry-head {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 12px;
    }
    .entry-head h4 {
      justify-self: start;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .radio-check {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(116,255,173,.26);
      background: rgba(116,255,173,.10);
      color: #74ffad;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .04em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .entry-direction {
      justify-self: center;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      white-space: nowrap;
    }
    .entry-block {
      justify-self: end;
      font-size: 18px;
      font-weight: 800;
      color: var(--accent-2);
      letter-spacing: .02em;
    }
    .break-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px dashed rgba(255,255,255,.15);
      background: rgba(255,255,255,.02);
      color: var(--muted);
      font-size: 13px;
    }
    .break-strip.active-break {
      border-color: rgba(255,176,104,.45);
      background:
        linear-gradient(90deg, rgba(255,176,104,.12), rgba(255,255,255,.035)),
        rgba(255,176,104,.04);
      color: var(--text);
      box-shadow: 0 0 0 1px rgba(255,176,104,.08) inset;
    }
    .break-strip.split-break {
      justify-content: stretch;
      border-style: solid;
      border-color: rgba(255,176,104,.24);
      background: linear-gradient(90deg, rgba(255,176,104,.08), rgba(255,255,255,.025));
      border-radius: 16px;
      padding: 12px 14px;
      text-align: center;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
    }
    .break-pill {
      color: var(--accent-2);
      font-weight: 700;
    }
    .break-title {
      font-weight: 800;
      color: var(--text);
      letter-spacing: .02em;
    }
    .break-detail {
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
    }
    .break-countdown {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--accent-2);
      font-weight: 700;
      white-space: nowrap;
      width: 100%;
    }
    .split-side {
      min-width: 0;
    }
    .split-side.left {
      text-align: left;
    }
    .split-side.right {
      text-align: right;
    }
    .split-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .split-time {
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
    }
    .split-center {
      min-width: 170px;
    }
    .otrain-icon {
      width: 20px;
      height: 20px;
      display: inline-block;
    }
    .auth-grid {
      display: grid;
      gap: 12px;
      max-width: 440px;
    }
    .auth-grid input {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(30,36,44,.92);
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
    }
    .section-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(255,255,255,.02);
      padding: 16px;
    }
    .stack-form {
      display: grid;
      gap: 12px;
    }
    .field-stack {
      display: grid;
      gap: 6px;
    }
    .field-label {
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .field-inline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .toggle-inline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      text-transform: none;
      letter-spacing: 0;
      cursor: pointer;
      user-select: none;
    }
    .toggle-inline input {
      margin: 0;
      accent-color: var(--accent-2);
    }
    .password-toggle-row {
      display: flex;
      justify-content: flex-start;
      margin-top: 4px;
    }
    .text-input, .select-input {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(30,36,44,.92);
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
    }
    .text-input.input-error {
      border-color: rgba(255,120,120,.7);
      box-shadow: 0 0 0 1px rgba(255,120,120,.35);
    }
    .btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,.14);
      background: linear-gradient(180deg, #de4a31, #bc301f);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .section-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      margin-top: 10px;
    }
    .auth-notice {
      margin-bottom: 14px;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.4;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
    }
    .auth-notice.warn {
      border-color: rgba(255,176,104,.28);
      color: var(--accent-2);
      background: rgba(255,176,104,.06);
    }
    .auth-notice.ok {
      border-color: rgba(116,255,173,.24);
      color: #74ffad;
      background: rgba(116,255,173,.06);
    }
    .my-work-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
      align-items: start;
    }
    .work-day-section {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(255,255,255,.025);
      overflow: hidden;
    }
    .work-day-section h3 {
      margin: 0;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 16px;
    }
    .work-day-body {
      padding: 14px;
      display: grid;
      gap: 10px;
    }
    .work-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(17,22,28,.72);
    }
    .work-item-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .work-empty {
      color: var(--muted);
      border: 1px dashed rgba(255,255,255,.14);
      border-radius: 14px;
      padding: 14px;
    }
    .overlay-page-copy {
      color: var(--muted);
      margin: 8px 0 0;
    }
    .linkish-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(10,14,20,.45);
      color: #a9c6ff;
      border-radius: 999px;
      padding: 9px 13px;
      font: inherit;
      cursor: pointer;
    }
    .muted { color: var(--muted); }
    @media (max-width: 780px) {
      .header {
        grid-template-columns: 1fr;
        align-items: stretch;
      }
      .brand {
        align-items: flex-start;
      }
      .brand-badge {
        width: 38px;
        height: 38px;
        border-radius: 10px;
      }
      .brand h1 {
        font-size: 16px;
      }
      .brand p {
        font-size: 13px;
      }
      .header-nav {
        justify-items: stretch;
      }
      .header-actions,
      .header-utility {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      .header-btn {
        text-align: center;
        justify-content: center;
      }
      .field-grid {
        grid-template-columns: 1fr;
      }
      .app {
        width: 100vw;
        min-height: 100vh;
        margin: 0;
        border-radius: 0;
        border-left: 0;
        border-right: 0;
      }
      .header,
      .chat,
      .composer {
        padding-left: 16px;
        padding-right: 16px;
      }
      .composer form { grid-template-columns: 1fr; }
      .card-head h3 { font-size: 32px; }
      .board-grid {
        grid-template-columns: 1fr;
      }
      .today-board-view {
        padding: 16px;
      }
      .board-page-head {
        display: grid;
      }
      .board-page-meta {
        justify-content: stretch;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .board-stat {
        text-align: left;
      }
      .today-board-view .board-grid {
        grid-template-columns: 1fr;
      }
      .today-board-view .board-section {
        min-height: 0;
      }
      .action-mimic {
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .action-mimic .trip-side.end {
        text-align: left;
      }
      .search-btn {
        min-height: 52px;
      }
      .map-shell {
        min-width: 2200px;
        width: 2200px;
      }
      .station-node {
        font-size: 11px;
      }
      .app.map-mode {
        overflow: hidden;
      }
      .app.map-mode .live-map-view {
        width: 100vw;
        min-height: 100dvh;
        overflow-y: auto;
        overflow-x: hidden;
        padding-bottom: max(16px, env(safe-area-inset-bottom));
      }
      .ats-head {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 8px 10px;
        align-items: center;
        padding: 8px;
      }
      .ats-logo {
        min-width: 88px;
        height: 28px;
        font-size: 13px;
      }
      .ats-head h2 {
        font-size: 15px;
        line-height: 1.08;
        letter-spacing: .01em;
      }
      .ats-clock {
        grid-column: 1 / -1;
        min-width: 0;
        width: 100%;
        padding: 5px 0 0;
        border: 0;
        border-top: 1px solid #b8c0c7;
        font-size: 11px;
        text-align: left;
      }
      .ats-state {
        display: none;
      }
      .ats-toolbar {
        position: sticky;
        top: 0;
        z-index: 3;
        overflow: hidden;
        white-space: normal;
        flex-wrap: wrap;
        gap: 5px;
        padding: 5px 6px;
        font-size: 10px;
      }
      .ats-toolbar .tool-cell {
        display: none;
      }
      .ats-toolbar .tool-cell.mobile-keep {
        display: inline-flex;
        flex: 1 1 145px;
        min-width: 0;
        border-left: 0;
        padding: 0 4px;
        white-space: normal;
      }
      .mimic-nav-btn {
        flex: 0 0 auto;
        height: 28px;
        font-size: 10px;
        padding: 0 8px;
      }
      .zoom-controls {
        margin-left: 4px;
        flex: 0 0 auto;
      }
      .zoom-controls button,
      .zoom-controls span {
        min-width: 38px;
        height: 28px;
        font-size: 10px;
      }
      .mimic-scroll {
        width: 100%;
        min-height: 330px;
        max-height: 48dvh;
        border-top: 1px solid #35424b;
        border-bottom: 1px solid #35424b;
      }
      .ats-svg {
        height: 330px;
      }
      .ats-panels {
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 8px;
      }
      .ats-panel {
        min-height: 0;
        overflow: hidden;
      }
      .ats-panel h3 {
        font-size: 12px;
      }
      .ats-table {
        display: table;
        table-layout: fixed;
        width: 100%;
        overflow: hidden;
        font-size: 11px;
      }
      .ats-table th,
      .ats-table td {
        padding: 5px 4px;
        overflow-wrap: anywhere;
        word-break: normal;
      }
      .ats-table th:nth-child(1),
      .ats-table td:nth-child(1) {
        width: 46px;
      }
      .ats-table th:nth-child(2),
      .ats-table td:nth-child(2) {
        width: 56px;
      }
      .ats-table th:nth-child(5),
      .ats-table td:nth-child(5) {
        width: 54px;
      }
      .legend-row,
      .control-row,
      .note-row {
        font-size: 11px;
        padding: 5px 7px;
      }
      .entry-head {
        grid-template-columns: 1fr;
      }
      .entry-direction,
      .entry-block {
        justify-self: start;
        text-align: left;
      }
      .trip-row {
        grid-template-columns: minmax(0, 1fr) 92px minmax(0, 1fr);
        gap: 8px;
        align-items: center;
        padding: 10px 10px;
      }
      .trip-side.end {
        justify-self: end;
        text-align: right;
      }
      .trip-stop {
        font-size: 14px;
      }
      .trip-time {
        font-size: 18px;
      }
      .trip-duration {
        font-size: 11px;
      }
      .trip-rail {
        width: 100%;
      }
      .trip-train {
        font-size: 14px;
      }
      .break-strip.split-break {
        grid-template-columns: 1fr;
      }
      .split-side.left,
      .split-side.right {
        text-align: center;
      }
      .modal {
        width: 100%;
        max-height: calc(100vh - 20px);
        border-radius: 18px;
      }
      .modal-body,
      .modal-head {
        padding-left: 16px;
        padding-right: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="brand">
        <div class="brand-badge">ER</div>
        <div>
          <h1>ERO Operator Tools</h1>
          <p>Paddle tools for OC Transpo rail operators</p>
        </div>
      </div>
      <div class="header-nav">
        <div class="header-actions">
          <button id="homeBtn" class="header-btn is-primary is-active" type="button">Paddle Lookup</button>
          <button id="myWorkBtn" class="header-btn is-primary" type="button">My Work</button>
          <button id="todaysPaddleBtn" class="header-btn is-primary" type="button">Today's Paddle</button>
          <button id="liveMapBtn" class="header-btn is-primary" type="button">Line 1 Map</button>
          <button id="todayBoardBtn" class="header-btn is-primary" type="button">Board</button>
        </div>
        <div class="header-utility">
          <button id="accountBtn" class="header-btn" type="button">Account</button>
          <button id="clearBtn" class="header-btn" type="button">Clear</button>
          <span id="statusPill" class="header-btn status-pill">Ready</span>
        </div>
      </div>
    </header>

    <main class="main">
      <section id="chat" class="chat">
        <div class="message intro">
          <strong>Enter a paddle number</strong>, for example <strong>14</strong> or <strong>1-14</strong>.
        </div>
      </section>
      <section class="composer" aria-label="Search paddles">
        <form id="chatForm">
          <input id="chatInput" type="text" placeholder="Enter a paddle number, e.g. 7 or 14">
          <button class="search-btn" type="submit">Search</button>
        </form>
      </section>
      <section id="myWorkView" class="today-board-view" hidden></section>
      <section id="todaysPaddleView" class="today-board-view" hidden></section>
      <section id="todayBoardView" class="today-board-view" hidden></section>
      <section id="liveMapView" class="live-map-view" hidden></section>
    </main>
  </div>

  <div id="paddleOverlay" class="overlay" hidden>
    <section class="modal">
      <header class="modal-head">
        <div>
          <h2 id="paddleTitle">Paddle</h2>
          <p id="paddleMeta" class="muted"></p>
        </div>
        <div class="modal-controls">
          <button id="jumpToCurrentBtn" class="close-btn jump-btn" type="button" title="Jump to current trip">↓</button>
          <button id="closePaddleBtn" class="close-btn" type="button">x</button>
        </div>
      </header>
      <div id="paddleBody" class="modal-body"></div>
    </section>
  </div>

  <div id="accountOverlay" class="overlay" hidden>
    <section class="modal">
      <header class="modal-head">
        <div>
          <h2 id="accountTitle">Account</h2>
          <p id="accountMeta" class="muted"></p>
        </div>
        <div class="modal-controls">
          <button id="closeAccountBtn" class="close-btn" type="button">x</button>
        </div>
      </header>
      <div id="accountBody" class="modal-body"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const chat = document.getElementById('chat');
    const liveMapView = document.getElementById('liveMapView');
    const todaysPaddleView = document.getElementById('todaysPaddleView');
    const todayBoardView = document.getElementById('todayBoardView');
    const chatForm = document.getElementById('chatForm');
    const chatInput = document.getElementById('chatInput');
    const homeBtn = document.getElementById('homeBtn');
    const myWorkBtn = document.getElementById('myWorkBtn');
    const todaysPaddleBtn = document.getElementById('todaysPaddleBtn');
    const liveMapBtn = document.getElementById('liveMapBtn');
    const todayBoardBtn = document.getElementById('todayBoardBtn');
    const accountBtn = document.getElementById('accountBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusPill = document.getElementById('statusPill');
    const myWorkView = document.getElementById('myWorkView');
    const paddleOverlay = document.getElementById('paddleOverlay');
    const paddleTitle = document.getElementById('paddleTitle');
    const paddleMeta = document.getElementById('paddleMeta');
    const paddleBody = document.getElementById('paddleBody');
    const jumpToCurrentBtn = document.getElementById('jumpToCurrentBtn');
    const closePaddleBtn = document.getElementById('closePaddleBtn');
    const accountOverlay = document.getElementById('accountOverlay');
    const accountMeta = document.getElementById('accountMeta');
    const accountBody = document.getElementById('accountBody');
    const closeAccountBtn = document.getElementById('closeAccountBtn');
    let currentLookup = null;
    let liveMapTimer = null;
    let todayBoardTimer = null;
    let liveMapZoom = 1;
    let liveMapZoomTouched = false;
    let latestLiveMapData = null;
    let pendingLiveMapZoomAnchor = null;
    const todaysPaddleStorageKey = 'ero_todays_paddles_v1';
    let supabaseEnabled = false;
    let supabaseClient = null;
    let currentUser = null;
    let currentProfile = null;
    let accountOptions = null;
    let myWorkDraft = null;
    let accountAuthMode = 'signin';
    let accountResetMode = false;
    let accountRecoveryMode = false;
    let accountNotice = { text: '', type: '' };

    function setActiveNav(targetId = 'homeBtn') {
      [homeBtn, myWorkBtn, todaysPaddleBtn, liveMapBtn, todayBoardBtn].forEach((button) => {
        if (!button) return;
        button.classList.toggle('is-active', button.id === targetId);
      });
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function addMessage(text, role = 'bot') {
      const bubble = document.createElement('div');
      bubble.className = `message ${role}`;
      bubble.textContent = text;
      chat.appendChild(bubble);
      chat.scrollTop = chat.scrollHeight;
    }

    function clearCards() {
      chat.querySelectorAll('.card').forEach((node) => node.remove());
    }

    function resetChat() {
      stopTodayBoardRefresh();

    function normalizePaddleId(value) {
      const text = String(value || '').trim();
      if (/^\d{1,2}$/.test(text)) return `1-${Number(text)}`;
      const match = text.match(/^(\d+)-(\d+)$/);
      if (match) return `${Number(match[1])}-${Number(match[2])}`;
      return text;
    }

    function formatServiceLabel(serviceDay) {
      const map = {
        mon_thu: 'Mon-Thu',
        friday: 'Friday',
        saturday: 'Saturday',
        sunday: 'Sunday',
      };
      return map[serviceDay] || serviceDay;
    }

    function getCurrentServiceDayKey() {
      const weekday = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'America/Toronto',
        weekday: 'short',
      }).format(new Date()).toLowerCase();
      if (weekday === 'fri') return 'friday';
      if (weekday === 'sat') return 'saturday';
      if (weekday === 'sun') return 'sunday';
      return 'mon_thu';
    }

    function setStatus(text, good = true) {
      statusPill.textContent = text;
      statusPill.style.color = good ? '#74ffad' : '#ffb068';
      statusPill.style.borderColor = good ? 'rgba(116,255,173,.22)' : 'rgba(255,176,104,.22)';
    }

    function closePaddleModal() {
      paddleOverlay.hidden = true;
      document.body.style.overflow = '';
    }

    function getOttawaDateKey() {
      const parts = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'America/Toronto',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
      }).formatToParts(new Date());
      const lookup = Object.fromEntries(parts.map((part) => [part.type, part.value]));
      return `${lookup.year}-${lookup.month}-${lookup.day}`;
    }

    function readTodaysPaddleStore() {
      try {
        const raw = localStorage.getItem(todaysPaddleStorageKey);
        const parsed = raw ? JSON.parse(raw) : {};
        const today = getOttawaDateKey();
        if (!parsed || typeof parsed !== 'object' || parsed.date !== today) {
          const next = { date: today, items: [] };
          localStorage.setItem(todaysPaddleStorageKey, JSON.stringify(next));
          return next;
        }
        return { date: today, items: Array.isArray(parsed.items) ? parsed.items : [] };
      } catch (_) {
        return { date: getOttawaDateKey(), items: [] };
      }
    }

    function writeTodaysPaddleStore(store) {
      try {
        localStorage.setItem(todaysPaddleStorageKey, JSON.stringify(store));
      } catch (_) {
        // keep working without storage if blocked
      }
    }

    function isSavedToTodaysPaddle(paddleId, serviceDay) {
      const store = readTodaysPaddleStore();
      return store.items.some((item) => item.paddleId === paddleId && item.serviceDay === serviceDay);
    }

    function saveToTodaysPaddle(data) {
      const store = readTodaysPaddleStore();
      const items = store.items.filter((item) => !(item.paddleId === data.paddleId && item.serviceDay === data.serviceDay));
      items.unshift({
        paddleId: data.paddleId,
        serviceDay: data.serviceDay,
        savedAt: new Date().toISOString(),
        source: 'manual',
      });
      writeTodaysPaddleStore({ date: store.date, items });
    }

    function removeFromTodaysPaddle(paddleId, serviceDay) {
      const store = readTodaysPaddleStore();
      const items = store.items.filter((item) => !(item.paddleId === paddleId && item.serviceDay === serviceDay));
      writeTodaysPaddleStore({ date: store.date, items });
    }

    function hasTodaysPaddleItems() {
      const store = readTodaysPaddleStore();
      return Array.isArray(store.items) && store.items.length > 0;
    }

    function syncTodaysPaddleFromMyWork() {
      if (!currentProfile) return false;
      const serviceDay = getCurrentServiceDayKey();
      const todayPaddles = getSavedProfilePaddles(serviceDay);
      const store = readTodaysPaddleStore();
      const manualItems = (store.items || []).filter((item) => {
        if (!item || typeof item !== 'object') return false;
        if (item.source === 'my_work' && item.serviceDay === serviceDay) return false;
        return true;
      });
      const seen = new Set();
      const myWorkItems = todayPaddles.map((paddleId) => ({
        paddleId,
        serviceDay,
        savedAt: new Date().toISOString(),
        source: 'my_work',
      })).filter((item) => {
        const key = `${item.serviceDay}:${item.paddleId}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
      const mergedManualItems = manualItems.filter((item) => {
        const key = `${item.serviceDay}:${item.paddleId}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
      writeTodaysPaddleStore({
        date: store.date,
        items: [...myWorkItems, ...mergedManualItems],
      });
      return myWorkItems.length > 0;
    }

    async function maybeOpenTodaysPaddleOnBoot() {
      if (accountRecoveryMode) return;
      if (!hasTodaysPaddleItems()) return;
      await openTodaysPaddlePage();
    }

    function profileColumnForServiceDay(serviceDay) {
      const map = {
        mon_thu: 'mon_thu_paddles',
        friday: 'friday_paddles',
        saturday: 'saturday_paddles',
        sunday: 'sunday_paddles',
      };
      return map[serviceDay] || 'mon_thu_paddles';
    }

    function getSavedProfilePaddles(serviceDay) {
      if (!currentProfile) return [];
      const key = profileColumnForServiceDay(serviceDay);
      return Array.isArray(currentProfile[key]) ? currentProfile[key] : [];
    }

    function cloneMyWorkDraftFromProfile() {
      myWorkDraft = {
        mon_thu: [...getSavedProfilePaddles('mon_thu')],
        friday: [...getSavedProfilePaddles('friday')],
        saturday: [...getSavedProfilePaddles('saturday')],
        sunday: [...getSavedProfilePaddles('sunday')],
      };
      return myWorkDraft;
    }

    function getDraftPaddlesForDay(serviceDay) {
      if (!myWorkDraft) cloneMyWorkDraftFromProfile();
      return Array.isArray(myWorkDraft?.[serviceDay]) ? myWorkDraft[serviceDay] : [];
    }

    function addPaddleToMyWorkDraft(serviceDay, paddleId) {
      const normalized = normalizePaddleId(paddleId);
      if (!/^\d+-\d+$/.test(normalized)) {
        return { ok: false, error: 'Enter a valid paddle number like 14 or 1-14.' };
      }
      if (!myWorkDraft) cloneMyWorkDraftFromProfile();
      const items = new Set(getDraftPaddlesForDay(serviceDay));
      items.add(normalized);
      myWorkDraft[serviceDay] = Array.from(items).sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
      return { ok: true, paddleId: normalized };
    }

    function removePaddleFromMyWorkDraft(serviceDay, paddleId) {
      if (!myWorkDraft) cloneMyWorkDraftFromProfile();
      myWorkDraft[serviceDay] = getDraftPaddlesForDay(serviceDay).filter((item) => item !== paddleId);
    }

    function isSavedToMyWork(paddleId, serviceDay) {
      return getSavedProfilePaddles(serviceDay).includes(paddleId);
    }

    function setAccountNotice(text = '', type = '') {
      accountNotice = { text, type };
    }

    function renderAccountNotice() {
      if (!accountNotice.text) return '';
      return `<div class="auth-notice ${escapeHtml(accountNotice.type || '')}">${escapeHtml(accountNotice.text)}</div>`;
    }

    function getAuthRedirectUrl() {
      return `${window.location.origin}${window.location.pathname}`;
    }

    function isRecoveryUrl() {
      const hash = String(window.location.hash || '');
      const search = String(window.location.search || '');
      return /type=recovery/i.test(hash) || /type=recovery/i.test(search);
    }

    function clearAccountFieldErrors() {
      accountBody.querySelectorAll('.input-error').forEach((node) => node.classList.remove('input-error'));
    }

    function markAccountFieldError(id) {
      const node = document.getElementById(id);
      if (node) node.classList.add('input-error');
    }

    function updateAccountButton() {
      if (!supabaseEnabled) {
        accountBtn.textContent = 'Accounts Off';
        myWorkBtn.textContent = 'My Work';
        return;
      }
      accountBtn.textContent = currentUser ? 'Settings' : 'Account';
    }

    function closeAccountModal() {
      accountOverlay.hidden = true;
      document.body.style.overflow = '';
    }

    function openAccountModal() {
      renderAccountModal();
      accountOverlay.hidden = false;
      document.body.style.overflow = 'hidden';
    }

    async function fetchSupabaseConfig() {
      try {
        const response = await fetch('/api/supabase-config');
        const data = await response.json();
        if (!response.ok || !data.ok || !data.enabled) return null;
        return data;
      } catch (_) {
        return null;
      }
    }

    async function fetchAccountOptions() {
      if (accountOptions) return accountOptions;
      try {
        const response = await fetch('/api/account-options');
        const data = await response.json();
        if (!response.ok || !data.ok) return null;
        accountOptions = data.paddleOptions || null;
        return accountOptions;
      } catch (_) {
        return null;
      }
    }

    async function ensureProfileRow() {
      if (!supabaseClient || !currentUser) return;
      if (currentProfile) return;
      const fallbackName = currentUser.user_metadata?.display_name || currentUser.user_metadata?.username || '';
      const { data } = await supabaseClient
        .from('ero_user_profiles')
        .upsert({
          user_id: currentUser.id,
          display_name: fallbackName || null,
        }, { onConflict: 'user_id' })
        .select('*')
        .single();
      currentProfile = data || {
        user_id: currentUser.id,
        display_name: fallbackName || null,
        mon_thu_paddles: [],
        friday_paddles: [],
        saturday_paddles: [],
        sunday_paddles: [],
      };
    }

    async function loadProfile() {
      if (!supabaseClient || !currentUser) {
        currentProfile = null;
        myWorkDraft = null;
        updateAccountButton();
        return;
      }
      const { data, error } = await supabaseClient
        .from('ero_user_profiles')
        .select('*')
        .eq('user_id', currentUser.id)
        .maybeSingle();
      if (error) {
        currentProfile = null;
      } else if (data) {
        currentProfile = data;
      } else {
        currentProfile = null;
        await ensureProfileRow();
      }
      myWorkDraft = null;
      syncTodaysPaddleFromMyWork();
      updateAccountButton();
    }

    async function saveCurrentProfile() {
      if (!supabaseClient || !currentUser || !currentProfile) return { ok: false, error: 'Not signed in.' };
      const payload = {
        user_id: currentUser.id,
        display_name: currentProfile.display_name || null,
        mon_thu_paddles: getSavedProfilePaddles('mon_thu'),
        friday_paddles: getSavedProfilePaddles('friday'),
        saturday_paddles: getSavedProfilePaddles('saturday'),
        sunday_paddles: getSavedProfilePaddles('sunday'),
      };
      const { data, error } = await supabaseClient
        .from('ero_user_profiles')
        .upsert(payload, { onConflict: 'user_id' })
        .select('*')
        .single();
      if (error) return { ok: false, error: error.message || 'Could not save profile.' };
      currentProfile = data;
      myWorkDraft = null;
      return { ok: true };
    }

    async function saveMyWorkDraft() {
      if (!currentUser) return { ok: false, error: 'Sign in first to save your work.' };
      await ensureProfileRow();
      if (!myWorkDraft) cloneMyWorkDraftFromProfile();
      currentProfile.mon_thu_paddles = [...getDraftPaddlesForDay('mon_thu')];
      currentProfile.friday_paddles = [...getDraftPaddlesForDay('friday')];
      currentProfile.saturday_paddles = [...getDraftPaddlesForDay('saturday')];
      currentProfile.sunday_paddles = [...getDraftPaddlesForDay('sunday')];
      const result = await saveCurrentProfile();
      if (result.ok) syncTodaysPaddleFromMyWork();
      return result;
    }

    async function savePaddleToMyWork(paddleId, serviceDay) {
      if (!currentUser) {
        setAccountNotice('Sign in first to save paddles to My Work.', 'warn');
        openAccountModal();
        return false;
      }
      await ensureProfileRow();
      const key = profileColumnForServiceDay(serviceDay);
      currentProfile[key] = [...new Set([...(currentProfile[key] || []), paddleId])];
      const result = await saveCurrentProfile();
      if (!result.ok) {
        setStatus('Save failed', false);
        setAccountNotice(result.error, 'warn');
        return false;
      }
      syncTodaysPaddleFromMyWork();
      if (!todaysPaddleView.hidden) {
        await renderTodaysPaddlePage();
      }
      setStatus('Saved to My Work', true);
      return true;
    }

    async function removePaddleFromMyWork(paddleId, serviceDay) {
      if (!currentUser || !currentProfile) return false;
      const key = profileColumnForServiceDay(serviceDay);
      currentProfile[key] = (currentProfile[key] || []).filter((item) => item !== paddleId);
      const result = await saveCurrentProfile();
      if (!result.ok) {
        setStatus('Remove failed', false);
        return false;
      }
      syncTodaysPaddleFromMyWork();
      if (!todaysPaddleView.hidden) {
        await renderTodaysPaddlePage();
      }
      setStatus('Removed from My Work', true);
      return true;
    }

    async function signInWithPassword() {
      clearAccountFieldErrors();
      const email = document.getElementById('authEmail')?.value?.trim() || '';
      const password = document.getElementById('authPassword')?.value || '';
      if (!email || !password) {
        if (!email) markAccountFieldError('authEmail');
        if (!password) markAccountFieldError('authPassword');
        setAccountNotice('Enter your email and password first.', 'warn');
        renderAccountModal();
        return;
      }
      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        markAccountFieldError('authEmail');
        markAccountFieldError('authPassword');
        setAccountNotice(error.message || 'Sign in failed.', 'warn');
        renderAccountModal();
        return;
      }
      setAccountNotice('', '');
      closeAccountModal();
    }

    async function signUpWithPassword() {
      clearAccountFieldErrors();
      const displayName = document.getElementById('authDisplayName')?.value?.trim() || '';
      const email = document.getElementById('authEmail')?.value?.trim() || '';
      const password = document.getElementById('authPassword')?.value || '';
      const passwordConfirm = document.getElementById('authPasswordConfirm')?.value || '';
      if (!displayName || !email || !password || !passwordConfirm) {
        if (!displayName) markAccountFieldError('authDisplayName');
        if (!email) markAccountFieldError('authEmail');
        if (!password) markAccountFieldError('authPassword');
        if (!passwordConfirm) markAccountFieldError('authPasswordConfirm');
        setAccountNotice('Enter your name, email, and both password fields.', 'warn');
        renderAccountModal();
        return;
      }
      if (password !== passwordConfirm) {
        markAccountFieldError('authPassword');
        markAccountFieldError('authPasswordConfirm');
        setAccountNotice('Passwords do not match.', 'warn');
        renderAccountModal();
        return;
      }
      const { data, error } = await supabaseClient.auth.signUp({
        email,
        password,
        options: {
          data: {
            display_name: displayName,
            username: displayName,
          },
        },
      });
      if (error) {
        setAccountNotice(error.message || 'Could not create the account.', 'warn');
        renderAccountModal();
        return;
      }
      if (data?.user?.id) {
        currentProfile = {
          user_id: data.user.id,
          display_name: displayName,
          mon_thu_paddles: [],
          friday_paddles: [],
          saturday_paddles: [],
          sunday_paddles: [],
        };
        await saveCurrentProfile();
      }
      accountAuthMode = 'signin';
      setAccountNotice('Account created. You can sign in now.', 'ok');
      renderAccountModal();
    }

    async function sendPasswordResetEmail() {
      clearAccountFieldErrors();
      const email = document.getElementById('resetEmail')?.value?.trim() || '';
      if (!email) {
        markAccountFieldError('resetEmail');
        setAccountNotice('Enter your email first.', 'warn');
        renderAccountModal();
        return;
      }
      const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
        redirectTo: getAuthRedirectUrl(),
      });
      if (error) {
        setAccountNotice(error.message || 'Could not send reset email.', 'warn');
        renderAccountModal();
        return;
      }
      setAccountNotice('Password reset email sent.', 'ok');
      renderAccountModal();
    }

    async function sendSignedInPasswordResetEmail() {
      const email = currentUser?.email || '';
      if (!email) {
        setAccountNotice('No account email was found.', 'warn');
        renderAccountModal();
        return;
      }
      const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
        redirectTo: getAuthRedirectUrl(),
      });
      if (error) {
        setAccountNotice(error.message || 'Could not send reset email.', 'warn');
        renderAccountModal();
        return;
      }
      setAccountNotice('Password reset email sent.', 'ok');
      renderAccountModal();
    }

    async function setNewPassword() {
      clearAccountFieldErrors();
      const password = document.getElementById('recoveryPassword')?.value || '';
      const confirm = document.getElementById('recoveryPasswordConfirm')?.value || '';
      if (!password || !confirm) {
        if (!password) markAccountFieldError('recoveryPassword');
        if (!confirm) markAccountFieldError('recoveryPasswordConfirm');
        setAccountNotice('Enter your new password in both fields.', 'warn');
        renderAccountModal();
        return;
      }
      if (password !== confirm) {
        markAccountFieldError('recoveryPassword');
        markAccountFieldError('recoveryPasswordConfirm');
        setAccountNotice('Passwords do not match.', 'warn');
        renderAccountModal();
        return;
      }
      const { error } = await supabaseClient.auth.updateUser({ password });
      if (error) {
        setAccountNotice(error.message || 'Could not update password.', 'warn');
        renderAccountModal();
        return;
      }
      accountRecoveryMode = false;
      setAccountNotice('Password updated.', 'ok');
      closeAccountModal();
    }

    async function saveSettings() {
      if (!currentUser) return;
      await ensureProfileRow();
      const displayName = document.getElementById('profileDisplayName')?.value?.trim() || '';
      currentProfile.display_name = displayName || null;
      const result = await saveCurrentProfile();
      if (!result.ok) {
        setAccountNotice(result.error, 'warn');
        renderAccountModal();
        return;
      }
      await supabaseClient.auth.updateUser({
        data: {
          display_name: displayName,
          username: displayName,
        },
      });
      setAccountNotice('Settings saved.', 'ok');
      renderAccountModal();
    }

    async function signOutUser() {
      if (!supabaseClient) return;
      await supabaseClient.auth.signOut();
      setAccountNotice('Signed out.', 'ok');
      closeAccountModal();
    }

    async function handleSession(session) {
      currentUser = session?.user || null;
      if (!currentUser) {
        currentProfile = null;
      } else {
        await loadProfile();
      }
      updateAccountButton();
      if (!accountOverlay.hidden) {
        renderAccountModal();
      }
      if (!myWorkView.hidden) {
        await renderMyWorkPage();
      }
    }

    async function initSupabase() {
      const config = await fetchSupabaseConfig();
      supabaseEnabled = Boolean(config && window.supabase && typeof window.supabase.createClient === 'function');
      updateAccountButton();
      if (!supabaseEnabled) {
        await maybeOpenTodaysPaddleOnBoot();
        return;
      }
      supabaseClient = window.supabase.createClient(config.url, config.anonKey);
      accountRecoveryMode = isRecoveryUrl();
      const { data } = await supabaseClient.auth.getSession();
      await handleSession(data.session);
      if (accountRecoveryMode) openAccountModal();
      supabaseClient.auth.onAuthStateChange(async (event, session) => {
        if (event === 'PASSWORD_RECOVERY') {
          accountRecoveryMode = true;
          openAccountModal();
        }
        await handleSession(session);
      });
      await maybeOpenTodaysPaddleOnBoot();
    }

    function timeToSecondsClock(value) {
      const match = String(value || '').trim().match(/^(\d{1,2}):(\d{2})$/);
      if (!match) return null;
      return (Number(match[1]) * 3600) + (Number(match[2]) * 60);
    }

    function getOttawaNowSeconds() {
      const parts = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'America/Toronto',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false,
      }).formatToParts(new Date());
      const lookup = Object.fromEntries(parts.map((part) => [part.type, part.value]));
      return (Number(lookup.hour || 0) * 3600) + (Number(lookup.minute || 0) * 60) + Number(lookup.second || 0);
    }

    function formatCountdown(totalSeconds) {
      const safe = Math.max(0, totalSeconds);
      const hours = Math.floor(safe / 3600);
      const minutes = Math.floor((safe % 3600) / 60);
      const seconds = safe % 60;
      if (hours > 0) return `${hours}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
      return `${minutes}:${String(seconds).padStart(2, '0')}`;
    }

    function formatDurationMinutes(totalMinutes) {
      const safe = Math.max(0, Number(totalMinutes) || 0);
      const hours = Math.floor(safe / 60);
      const minutes = safe % 60;
      if (hours && minutes) return `${hours} hr ${minutes} min`;
      if (hours) return `${hours} hr`;
      return `${minutes} min`;
    }

    function renderCountdown(live, prefixOverride = null) {
      if (!live || !live.targetTime || !['trip', 'break', 'prestart', 'clearing'].includes(live.kind)) return '';
      const prefix = prefixOverride || (live.kind === 'trip' ? 'Done in' : live.kind === 'clearing' ? 'Clear in' : 'Next trip in');
      return `<div class="muted" data-countdown="${escapeHtml(prefix)}" data-target-time="${escapeHtml(live.targetTime)}" data-countdown-kind="${escapeHtml(live.kind)}">${escapeHtml(prefix)} calculating...</div>`;
    }

    function getNextAction(live) {
      if (!live) {
        return { title: 'Enter a paddle to see what is coming up.', detail: '', countdownPrefix: '' };
      }
      if (live.kind === 'trip') {
        const tripName = live.sequence && live.directionLabel ? `Trip ${live.sequence} - ${live.directionLabel}` : `Trip ${live.sequence || ''}`.trim();
        return {
          title: tripName,
          detail: live.block ? `Block ${live.block}` : '',
          countdownPrefix: 'Done in',
        };
      }
      if (live.kind === 'prestart') {
        const startsAtTunneys = String(live.nextStartStop || '').toLowerCase().includes('tunney');
        if (live.phase === 'report') {
          if (startsAtTunneys) {
            return {
              title: `Head to Bayview to grab a radio${live.reportTime ? ` by ${live.reportTime}` : ''}`,
              detail: live.sequence ? `Trip ${live.sequence} at ${live.nextStartTime || live.targetTime || ''}`.trim() : '',
              countdownPrefix: 'Report in',
            };
          }
          const place = live.reportPlaceName || live.nextStartStop || 'report point';
          const time = live.reportTime || live.targetTime || '';
          return {
            title: `Report at ${place}${time ? ` at ${time}` : ''}`,
            detail: live.sequence && live.directionLabel ? `Trip ${live.sequence} - ${live.directionLabel}` : '',
            countdownPrefix: 'Report in',
          };
        }
        if (startsAtTunneys) {
          return {
            title: `Make your way to Tunney's for Trip ${live.sequence || ''}${live.nextStartTime ? ` at ${live.nextStartTime}` : ''}`.trim(),
            detail: live.block ? `Block ${live.block}` : '',
            countdownPrefix: 'Depart in',
          };
        }
        const place = live.nextStartStop || 'start point';
        const time = live.nextStartTime || live.targetTime || '';
        return {
          title: `Depart ${place}${time ? ` at ${time}` : ''}`,
          detail: live.nextEndStop ? `Toward ${live.nextEndStop}${live.block ? ` | Block ${live.block}` : ''}` : '',
          countdownPrefix: 'Depart in',
        };
      }
      if (live.kind === 'break') {
        const time = live.nextStartTime || live.targetTime || '';
        if (live.splitBreak) {
          const secondPieceStartsAtTunneys = String(live.nextStartStop || '').toLowerCase().includes('tunney');
          if (secondPieceStartsAtTunneys) {
            return {
              title: `Head to Bayview to grab a radio${time ? ` by ${time}` : ''}`,
              detail: `Second piece${live.nextSequence ? ` Trip ${live.nextSequence}` : ''} starts at Tunney's${live.nextTripStartTime ? ` at ${live.nextTripStartTime}` : ''}`,
              countdownPrefix: 'Back in',
            };
          }
          return {
            title: `Split ends${time ? ` at ${time}` : ''}`,
            detail: live.nextStartStop ? `Back at ${live.nextStartStop}` : '',
            countdownPrefix: 'Back in',
          };
        }
        return {
          title: `Break until Trip ${live.nextSequence || ''}${time ? ` at ${time}` : ''}`.trim(),
          detail: live.nextStartStop ? `Next start: ${live.nextStartStop}` : '',
          countdownPrefix: 'Remaining',
        };
      }
      if (live.kind === 'clearing') {
        if (live.label && live.label.startsWith('Going on split')) {
          return {
            title: live.label,
            detail: live.block ? `Block ${live.block}` : '',
            countdownPrefix: 'Split in',
          };
        }
        if (live.finalClear) {
          return {
            title: `Return and sign out radio${live.targetTime ? ` by ${live.targetTime}` : ''}`,
            detail: live.directionLabel ? `After ${live.directionLabel}` : '',
            countdownPrefix: 'Clear in',
          };
        }
        return {
          title: `Clear block ${live.block || ''}${live.targetTime ? ` at ${live.targetTime}` : ''}`.trim(),
          detail: live.directionLabel ? `After ${live.directionLabel}` : '',
          countdownPrefix: 'Clear in',
        };
      }
      if (live.kind === 'complete') {
        return { title: live.label || 'Done for today.', detail: '', countdownPrefix: '' };
      }
      return { title: live.label || 'Paddle loaded.', detail: '', countdownPrefix: '' };
    }

    async function refreshPaddleCard(card) {
      if (!card || card.dataset.refreshing === 'true') return;
      const paddleId = card.dataset.paddleCard;
      const serviceDay = card.dataset.serviceDay || '';
      if (!paddleId) return;
      card.dataset.refreshing = 'true';
      try {
        const params = new URLSearchParams({ id: paddleId });
        if (serviceDay) params.set('day', serviceDay);
        const response = await fetch(`/api/paddle?${params.toString()}`);
        const data = await response.json();
        if (!response.ok || !data.ok) throw new Error(data.error || 'Paddle refresh failed.');
        currentLookup = data;
        if (card.closest('#todaysPaddleView')) {
          await renderTodaysPaddlePage();
        } else {
          addPaddleCard(data);
        }
        if (!paddleOverlay.hidden && currentLookup?.paddleId === data.paddleId && currentLookup?.serviceDay === data.serviceDay) {
          openPaddleModal(data);
        }
      } catch (_) {
        card.dataset.refreshing = 'false';
      }
    }

    function refreshCountdowns() {
      const nowSeconds = getOttawaNowSeconds();
      document.querySelectorAll('[data-countdown][data-target-time]').forEach((node) => {
        const targetSeconds = timeToSecondsClock(node.getAttribute('data-target-time'));
        if (targetSeconds === null) return;
        let diff = targetSeconds - nowSeconds;
        if (diff < 0) {
          node.textContent = `${node.getAttribute('data-countdown')} updating...`;
          const card = node.closest('[data-paddle-card]');
          if (card) refreshPaddleCard(card);
          return;
        }
        node.textContent = `${node.getAttribute('data-countdown')} ${formatCountdown(diff)}`;
      });
      document.querySelectorAll('[data-trip-start][data-trip-end] .trip-train').forEach((node) => {
        const row = node.closest('[data-trip-start][data-trip-end]');
        const startSeconds = timeToSecondsClock(row?.getAttribute('data-trip-start'));
        const endSeconds = timeToSecondsClock(row?.getAttribute('data-trip-end'));
        if (startSeconds === null || endSeconds === null) return;
        let now = nowSeconds;
        const start = startSeconds;
        let end = endSeconds;
        if (end < start) end += 24 * 3600;
        if (now < start && (start - now) > 12 * 3600) now += 24 * 3600;

        let progress = 90;
        if (now < start) {
          progress = 10;
        } else if (now > end) {
          progress = 90;
        } else {
          const total = Math.max(1, end - start);
          const elapsed = Math.min(Math.max(0, now - start), total);
          progress = 10 + ((elapsed / total) * 80);
        }
        node.style.setProperty('--train-progress', `${progress}%`);
      });
    }

    function deriveEntryDirection(entry) {
      const firstTrip = (entry.trips || [])[0] || null;
      const startStop = String(firstTrip?.startStop || '').toLowerCase();
      const endStop = String(firstTrip?.endStop || '').toLowerCase();
      const startsFromPhnd = startStop.includes('phnd');
      const startsFromTerminus = startStop.includes('blair') || startStop.includes("tunney");
      const endsAtExit = endStop.includes('pexite') || endStop.includes('pexitw');
      if (startsFromTerminus && endsAtExit) return 'Reduction';
      if (startsFromPhnd && endStop.includes('tremblay')) return 'Launching West';
      if (startsFromPhnd && (endStop.includes('st laurent') || endStop.includes('st-laurent'))) return 'Launching East';
      if (endStop.includes('blair')) return 'East to Blair';
      if (endStop.includes("tunney")) return "West to Tunney's";
      return '';
    }

    function renderEntryCard(entry, live) {
      const tripRows = (entry.trips || []).map((trip, index) => renderTripRow(entry, trip, live, index)).join('');
      const directionLabel = deriveEntryDirection(entry);
      const isLiveBreak = Boolean(
        live
        && live.kind === 'break'
        && String(live.block || '') === String(entry.block || '')
        && String(live.sequence || '') === String(entry.sequence || '')
      );
      const isSplitBreak = typeof entry.breakAfterMinutes === 'number' && entry.breakAfterMinutes >= 90;
      const breakStrip = typeof entry.breakAfterMinutes === 'number' && entry.breakAfterMinutes > 0
        ? isSplitBreak
          ? `
          <div class="break-strip split-break${isLiveBreak ? ' active-break' : ''}" data-break-block="${escapeHtml(entry.block)}" data-break-sequence="${escapeHtml(entry.sequence)}">
            <div class="split-side left">
              <div class="split-label">Clear</div>
              <div class="split-time">${escapeHtml(entry.clearTime || entry.endTime || '')}</div>
            </div>
            <div class="split-center">
              <div class="break-title">Split break</div>
              <div class="break-detail">${escapeHtml(formatDurationMinutes(entry.breakAfterMinutes))}</div>
            </div>

    function findCurrentPaddleTargetInRoot(root, live) {
      if (!root || !live) return null;
      if (live.kind === 'break') {
        const breakNode = root.querySelector(`.break-strip.active-break[data-break-block="${CSS.escape(String(live.block || ''))}"][data-break-sequence="${CSS.escape(String(live.sequence || ''))}"]`);
        if (breakNode) return breakNode;
      }
      if (live.kind === 'trip') {
        const liveEntry = root.querySelector(`.entry-card.active[data-entry-block="${CSS.escape(String(live.block || ''))}"][data-entry-sequence="${CSS.escape(String(live.sequence || ''))}"]`);
        if (liveEntry) return liveEntry;
      }
      if (live.kind === 'prestart' || live.kind === 'clearing') {
        const entryNode = root.querySelector(`.entry-card[data-entry-block="${CSS.escape(String(live.block || ''))}"][data-entry-sequence="${CSS.escape(String(live.sequence || ''))}"]`);
        if (entryNode) return entryNode;
      }
      return root.querySelector('.entry-card.active')
        || root.querySelector('.break-strip.active-break')
        || null;
    }

    function findCurrentPaddleTarget(live) {
      return findCurrentPaddleTargetInRoot(paddleBody, live);

      if (!card) return null;
      return {

      if (!button) return;
      button.dataset.jumpState = state;

    function updateCardJumpButtonStateClean(button, state) {
      if (!button) return;
      button.dataset.jumpState = state;
      button.innerHTML = state === 'top' ? '&uarr;' : '&darr;';
      button.title = state === 'top' ? 'Back to top of paddle' : 'Jump to current trip';

    function handleInlinePaddleJump(button) {
      const card = button.closest('[data-paddle-card]');
      if (!card) return;
      const state = button.dataset.jumpState || 'current';
      if (state === 'top') {
        card.scrollIntoView({ behavior: 'smooth', block: 'start' });
        updateCardJumpButtonStateClean(button, 'current');
        return;
      }
      const live = readLiveStatusFromCard(card);
      const target = findCurrentPaddleTargetInRoot(card, live);
      if (!target) return;
      target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      updateCardJumpButtonStateClean(button, 'top');
    }
