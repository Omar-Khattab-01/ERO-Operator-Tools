    const ATS_LEFT = 95;
    const ATS_GAP = 138;
    const ATS_TRACK_1_Y = 150;
    const ATS_TRACK_2_Y = 245;
    const ATS_STATION_Y = 318;
    const ATS_RENDER_STATIONS = [
      { id: 'st01', code: 'ST01', label: ["Tunney's", 'Pasture'] },
      { id: 'st02', code: 'ST02', label: ['Bayview'] },
      { id: 'st03', code: 'ST03', label: ['Pimisi'] },
      { id: 'st04', code: 'ST04', label: ['Lyon'] },
      { id: 'st05', code: 'ST05', label: ['Parliament'] },
      { id: 'st06', code: 'ST06', label: ['Rideau'] },
      { id: 'st07', code: 'ST07', label: ['uOttawa'] },
      { id: 'st08', code: 'ST08', label: ['Lees'] },
      { id: 'st09', code: 'ST09', label: ['Hurdman'] },
      { id: 'st10', code: 'ST10', label: ['Tremblay'] },
      { id: 'st11', code: 'ST11', label: ['St-Laurent'] },
      { id: 'st12', code: 'ST12', label: ['Cyrville'] },
      { id: 'st13', code: 'ST13', label: ['Blair'] },
      { id: 'st14', code: 'ST14', label: ['Montreal'] },
      { id: 'st15', code: 'ST15', label: ['Jeanne', "d'Arc"] },
      { id: 'st16', code: 'ST16', label: ['Convent', 'Glen'] },
      { id: 'st17', code: 'ST17', label: ['Place', "d'Orleans"] },
      { id: 'st18', code: 'ST18', label: ['Trim'] },
    ];
    const ATS_RENDER_LEFT = 132;
    const ATS_RENDER_GAP = 146;
    const ATS_RENDER_TRACK_1_Y = 140;
    const ATS_RENDER_TRACK_2_Y = 245;
    const ATS_RENDER_LABEL_Y = 78;
    const ATS_MIMIC_WIDTH = 2720;
    const ATS_MIMIC_HEIGHT = 430;

    function stationX(index) {
      return ATS_RENDER_LEFT + (index * ATS_RENDER_GAP);
    }

    function projectTrainX(train, sourceStations) {
      const fallbackStations = Array.isArray(sourceStations) && sourceStations.length ? sourceStations : [];
      const minLon = Math.min(...fallbackStations.slice(0, 13).map((station) => station.lon));
      const maxLon = Math.max(...fallbackStations.slice(0, 13).map((station) => station.lon));
      if (!Number.isFinite(minLon) || !Number.isFinite(maxLon)) return stationX(0);
      const raw = ((Number(train.longitude) - minLon) / Math.max(0.0001, maxLon - minLon));
      return Math.min(stationX(12), Math.max(stationX(0), stationX(0) + (raw * (stationX(12) - stationX(0)))));
    }

    function blockIndexForX(x) {
      return Math.max(0, Math.min(ATS_RENDER_STATIONS.length - 2, Math.floor((x - ATS_RENDER_LEFT) / ATS_RENDER_GAP)));
    }

    function trainStatusFor(train, index) {
      const atPlatform = ATS_RENDER_STATIONS.some((_, stationIndex) => Math.abs(train.x - stationX(stationIndex)) < 12);
      if (atPlatform) return 'At platform';
      if (index % 7 === 0) return '+2';
      return 'On time';
    }

    function stationDisplayName(index) {
      const station = ATS_RENDER_STATIONS[Math.max(0, Math.min(ATS_RENDER_STATIONS.length - 1, index))];
      return station ? station.label.join(' ') : '';
    }

    function nearestStationIndex(x) {
      let bestIndex = 0;
      let bestDistance = Number.MAX_SAFE_INTEGER;
      ATS_RENDER_STATIONS.forEach((_, index) => {
        const distance = Math.abs(x - stationX(index));
        if (distance < bestDistance) {
          bestDistance = distance;
          bestIndex = index;
        }
      });
      return { index: bestIndex, distance: bestDistance };
    }

    function nextStationForTrain(train) {
      const nearest = nearestStationIndex(train.x);
      if (nearest.distance < 12) {
        const targetIndex = train.direction === 'west' ? nearest.index - 1 : nearest.index + 1;
        return stationDisplayName(targetIndex);
      }
      const blockIndex = blockIndexForX(train.x);
      return train.direction === 'west'
        ? stationDisplayName(blockIndex)
        : stationDisplayName(blockIndex + 1);
    }

    function currentSectionForTrain(train) {
      const nearest = nearestStationIndex(train.x);
      if (nearest.distance < 12) return `At ${stationDisplayName(nearest.index)}`;
      const blockIndex = blockIndexForX(train.x);
      const westStation = stationDisplayName(blockIndex);
      const eastStation = stationDisplayName(blockIndex + 1);
      return `Between ${westStation} and ${eastStation}`;
    }

    function setLiveMapZoom(nextZoom) {
      liveMapZoomTouched = true;
      const scroll = liveMapView.querySelector('.mimic-scroll');
      if (scroll) {
        const oldWidth = Math.round(ATS_MIMIC_WIDTH * liveMapZoom);
        pendingLiveMapZoomAnchor = {
          oldWidth,
          centerRatio: (scroll.scrollLeft + (scroll.clientWidth / 2)) / Math.max(1, oldWidth),
        };
      }
      liveMapZoom = Math.max(0.55, Math.min(1.8, nextZoom));
      if (latestLiveMapData) renderLiveMap(latestLiveMapData);
    }

    function renderLiveMap(data) {
      latestLiveMapData = data;
      const previousScroll = liveMapView.querySelector('.mimic-scroll')?.scrollLeft || 0;
      const scaledWidth = Math.round(ATS_MIMIC_WIDTH * liveMapZoom);
      const sourceStations = Array.isArray(data.stations) ? data.stations : [];
      const trains = Array.isArray(data.trains) ? data.trains : [];
      const trainPlacements = trains.map((train) => {
        const x = projectTrainX(train, sourceStations);
        const direction = train.direction === 'west' ? 'west' : 'east';
        return { ...train, x, y: direction === 'west' ? ATS_RENDER_TRACK_1_Y : ATS_RENDER_TRACK_2_Y, direction, blockIndex: blockIndexForX(x) };
      });
      const occupied = new Set(trainPlacements.map((train) => `${train.direction}-${train.blockIndex}`));
      const blocksHtml = ['west', 'east'].map((direction) => {
        const y = direction === 'west' ? ATS_RENDER_TRACK_1_Y : ATS_RENDER_TRACK_2_Y;
        const prefix = direction === 'west' ? 'U' : 'L';
        return ATS_RENDER_STATIONS.slice(0, -1).map((_, index) => {
          const x1 = stationX(index) + 14;
          const x2 = stationX(index + 1) - 14;
          const isOccupied = occupied.has(`${direction}-${index}`);
          const labelX = (x1 + x2) / 2;
          const blockLabel = `${prefix}${String(index + 101)}`;
          return `
            <line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="${isOccupied ? '#17c6c1' : '#eef3f6'}" stroke-width="3" stroke-linecap="square" />
            <rect x="${labelX - 17}" y="${y + (direction === 'west' ? -25 : 13)}" width="34" height="13" fill="#1c252c" stroke="#9ba6ad" stroke-width="1" />
            <text x="${labelX}" y="${y + (direction === 'west' ? -16 : 23)}" fill="#eef3f6" font-size="9" text-anchor="middle">${blockLabel}</text>
            <circle cx="${x2 - 10}" cy="${y - 10}" r="2.6" fill="#36d052" stroke="#0d220f" stroke-width="1" />
            <circle cx="${x2 - 4}" cy="${y - 7}" r="2.6" fill="#c9161d" stroke="#230d10" stroke-width="1" />
          `;
        }).join('');
      }).join('');
      const stationHtml = ATS_RENDER_STATIONS.map((station, index) => {
        const x = stationX(index);
        const labelLines = station.label.map((line, lineIndex) => (
          `<tspan x="${x}" dy="${lineIndex ? 12 : 0}">${escapeHtml(line)}</tspan>`
        )).join('');
        return `
          <line x1="${x}" y1="${ATS_RENDER_TRACK_1_Y - 22}" x2="${x}" y2="${ATS_RENDER_TRACK_2_Y + 22}" stroke="#cbd2d8" stroke-width="1" opacity=".72" />
          <rect x="${x - 6}" y="${ATS_RENDER_TRACK_1_Y - 15}" width="12" height="30" fill="#46515a" stroke="#eef3f6" stroke-width="1.5" />
          <rect x="${x - 6}" y="${ATS_RENDER_TRACK_2_Y - 15}" width="12" height="30" fill="#46515a" stroke="#eef3f6" stroke-width="1.5" />
          <text x="${x}" y="${ATS_RENDER_LABEL_Y}" fill="#f3f6f8" font-size="11" font-weight="800" text-anchor="middle">${labelLines}</text>
          <text x="${x}" y="${ATS_RENDER_TRACK_2_Y + 42}" fill="#e1e6ea" font-size="9" text-anchor="middle">${escapeHtml(station.code)}</text>
        `;
      }).join('');
      const trainHtml = trainPlacements.map((train, index) => {
        const label = train.blockId || String(index + 101);
        const arrowText = train.direction === 'west' ? '<-' : '->';
        const status = trainStatusFor(train, index);
        const paddleId = train.paddleId || '';
        const serviceDay = train.serviceDay || '';
        const x = Math.round(train.x);
        const y = train.y;
        return `
          <g class="ats-train-hit" data-open-paddle="${escapeHtml(paddleId)}" data-day="${escapeHtml(serviceDay)}">
            <rect x="${x - 32}" y="${y - 15}" width="64" height="30" fill="${train.direction === 'west' ? '#153568' : '#168c22'}" stroke="#f4f7f9" stroke-width="1" />
            <rect x="${x - 30}" y="${y - 13}" width="60" height="9" fill="rgba(255,255,255,.12)" />
            <text x="${x}" y="${y - 2}" fill="#ffffff" font-size="11" font-weight="900" text-anchor="middle">${escapeHtml(label)} ${arrowText}</text>
            <text x="${x}" y="${y + 11}" fill="#ffffff" font-size="8.5" text-anchor="middle">${escapeHtml(status)}</text>
            <title>${escapeHtml(`Paddle ${paddleId || '?'} | Block ${train.blockId || '?'} | Trip ${train.sequence || '?'}`)}</title>
          </g>
        `;
      }).join('');
      const activeRows = trainPlacements.map((train, index) => {
        const label = train.blockId || String(index + 101);
        const directionText = train.direction === 'west' ? '<- West' : '-> East';
        const current = currentSectionForTrain(train);
        const next = nextStationForTrain(train);
        const status = trainStatusFor(train, index);
        return `<tr><td>${escapeHtml(label)}</td><td>${escapeHtml(directionText)}</td><td>${escapeHtml(current)}</td><td>${escapeHtml(next)}</td><td>${escapeHtml(status)}</td></tr>`;
      }).join('');
      const clock = new Date().toLocaleString('en-CA', { timeZone: 'America/Toronto', weekday: 'short', month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });

      liveMapView.innerHTML = `
        <div class="ats-head">
          <div class="ats-logo">OC Transpo</div>
          <h2>Line 1 Live Operations Mimic</h2>
          <div class="ats-clock">${escapeHtml(clock)}</div>
          <div class="ats-state">
            <div>Line State<strong>Normal</strong></div>
            <div>Communications<strong>OK</strong></div>
            <div>Power<strong>OK</strong></div>
          </div>
        </div>
        <div class="ats-toolbar">
          <button type="button" class="mimic-nav-btn" data-exit-live-map>PADDLE LOOKUP</button>
          <span>DISPLAY: MAIN LINE 1 MIMIC</span>
          <span class="tool-cell">TRACK 1 WESTBOUND</span>
          <span class="tool-cell">TRACK 2 EASTBOUND</span>
          <span class="tool-cell mobile-keep">TAP BLOCK TO OPEN PADDLE</span>
          <span class="tool-cell">AUTO REFRESH 5 SEC</span>
          <span class="zoom-controls" aria-label="Mimic zoom controls">
            <button type="button" data-map-zoom="out">-</button>
            <span>${Math.round(liveMapZoom * 100)}%</span>
            <button type="button" data-map-zoom="in">+</button>
            <button type="button" data-map-zoom="fit">FIT</button>
          </span>
        </div>
        <div class="mimic-scroll">
          <svg class="ats-svg" style="width:${scaledWidth}px" viewBox="0 0 ${ATS_MIMIC_WIDTH} ${ATS_MIMIC_HEIGHT}" role="img" aria-label="Line 1 ATS mimic">
            <rect x="0" y="0" width="${ATS_MIMIC_WIDTH}" height="${ATS_MIMIC_HEIGHT}" fill="#46515a" />
            <rect x="8" y="${ATS_RENDER_TRACK_1_Y - 16}" width="98" height="18" fill="#29333a" stroke="#89949c" stroke-width="1" />
            <rect x="8" y="${ATS_RENDER_TRACK_2_Y - 16}" width="98" height="18" fill="#29333a" stroke="#89949c" stroke-width="1" />
            <text x="16" y="${ATS_RENDER_TRACK_1_Y - 4}" fill="#f3f6f8" font-size="10" font-weight="800">TRACK 1 WEST</text>
            <text x="16" y="${ATS_RENDER_TRACK_2_Y - 4}" fill="#f3f6f8" font-size="10" font-weight="800">TRACK 2 EAST</text>
            <line x1="${stationX(0)}" y1="${ATS_RENDER_TRACK_1_Y}" x2="${stationX(ATS_RENDER_STATIONS.length - 1)}" y2="${ATS_RENDER_TRACK_1_Y}" stroke="#eef3f6" stroke-width="2" />
            <line x1="${stationX(0)}" y1="${ATS_RENDER_TRACK_2_Y}" x2="${stationX(ATS_RENDER_STATIONS.length - 1)}" y2="${ATS_RENDER_TRACK_2_Y}" stroke="#eef3f6" stroke-width="2" />
            ${blocksHtml}
            ${stationHtml}
            ${trainHtml}
          </svg>
        </div>
        <div class="ats-panels">
          <section class="ats-panel">
            <h3>Active Blocks (${escapeHtml(trainPlacements.length)})</h3>
            <table class="ats-table"><thead><tr><th>Block</th><th>Direction</th><th>Current Section</th><th>Next Station</th><th>Status</th></tr></thead><tbody>${activeRows || '<tr><td colspan="5">No active scheduled blocks.</td></tr>'}</tbody></table>
          </section>
          <section class="ats-panel">
            <h3>Legend</h3>
            <div class="legend-row"><span class="legend-swatch"></span>Available track</div>
            <div class="legend-row"><span class="legend-swatch occ"></span>Occupied block</div>
            <div class="legend-row"><span class="legend-swatch blocked"></span>Blocked / out of service</div>
            <div class="legend-row"><span style="width:10px;height:10px;border-radius:50%;background:#36c94f;display:inline-block"></span>Signal clear</div>
            <div class="legend-row"><span style="width:10px;height:10px;border-radius:50%;background:#c9161d;display:inline-block"></span>Signal stop</div>
          </section>
          <section class="ats-panel">
            <h3>Notes</h3>
            <div class="note-row">- Main running tracks only.</div>
            <div class="note-row">- Train positions are scheduled from ERO paddles.</div>
            <div class="note-row">- Click a train marker to open its paddle.</div>
          </section>
        </div>
        ${data.ok && !trains.length ? `<div class="live-map-error">No active scheduled Line 1 train blocks were found from the current paddle data.</div>` : ''}
        ${data.ok ? '' : `<div class="live-map-error">${escapeHtml(data.error || 'Live Map is not configured yet.')}</div>`}
      `;
      const nextScroll = liveMapView.querySelector('.mimic-scroll');
      if (nextScroll && pendingLiveMapZoomAnchor) {
        const nextWidth = Math.round(ATS_MIMIC_WIDTH * liveMapZoom);
        nextScroll.scrollLeft = Math.max(
          0,
          (pendingLiveMapZoomAnchor.centerRatio * nextWidth) - (nextScroll.clientWidth / 2),
        );
        pendingLiveMapZoomAnchor = null;
      } else if (nextScroll) {
        nextScroll.scrollLeft = previousScroll;
      }
    }

    async function openLiveMap() {
      stopTodayBoardRefresh();
      stopLiveMapRefresh();
      document.querySelector('.app')?.classList.add('map-mode');
      setActiveNav('liveMapBtn');
      chat.hidden = true;
      myWorkView.hidden = true;
      todayBoardView.hidden = true;
      chatForm.closest('.composer').hidden = true;
      liveMapView.hidden = false;
      if (!liveMapZoomTouched && window.matchMedia('(max-width: 780px)').matches) {
        liveMapZoom = 0.68;
      }
      setStatus('Loading map...', true);
      const response = await fetch('/api/live-map');
      const data = await response.json();
      renderLiveMap(data);
      if (!data.ok) {
        setStatus('Map offline', false);
        return data;
      }
      setStatus('Map scheduled', true);
      liveMapTimer = setInterval(async () => {
        try {
          const nextResponse = await fetch('/api/live-map');
          const nextData = await nextResponse.json();
          renderLiveMap(nextData);
          setStatus(nextData.ok ? 'Map scheduled' : 'Map offline', Boolean(nextData.ok));
        } catch (_) {
          setStatus('Map offline', false);
        }
      }, 5000);
      return data;
    }

    async function runLookup(message) {
      stopTodayBoardRefresh();
      document.querySelector('.app')?.classList.remove('map-mode');
      setActiveNav('homeBtn');
      myWorkView.hidden = true;
      todaysPaddleView.hidden = true;
      todayBoardView.hidden = true;
      liveMapView.hidden = true;
      chat.hidden = false;
      chatForm.closest('.composer').hidden = false;
      setStatus('Looking up...', true);
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message }),
      });
      const data = await response.json();
      if (!response.ok || !data.ok) {
        throw new Error(data.error || 'Lookup failed.');
      }
      currentLookup = data;
      addPaddleCard(data);
      setStatus('Paddle ready', true);
      return data;
    }

    async function fetchPaddleData(paddleId, serviceDay) {
      const params = new URLSearchParams({ id: paddleId });
      if (serviceDay) params.set('day', serviceDay);
      const response = await fetch(`/api/paddle?${params.toString()}`);
      const data = await response.json();
      if (!response.ok || !data.ok) {
        throw new Error(data.error || 'Paddle lookup failed.');
      }
      return data;
    }

    async function openPaddle(paddleId, serviceDay) {
      const data = await fetchPaddleData(paddleId, serviceDay);
      currentLookup = data;
      if (!chat.hidden) addPaddleCard(data);
      openPaddleModal(data);
      setStatus('Paddle ready', true);
      return data;
    }

    chatForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const message = chatInput.value.trim();
      if (!message) return;
      if (message.toLowerCase() === 'clear') {
        chatInput.value = '';
        stopLiveMapRefresh();
        resetChat();
        return;
      }
      addMessage(normalizePaddleId(message), 'user');
      chatInput.value = '';
      try {
        await runLookup(message);
      } catch (error) {
        addMessage(error.message || 'Lookup failed.');
        setStatus('Lookup failed', false);
      }
    });

    clearBtn.addEventListener('click', () => {
      resetChat();
    });

    homeBtn.addEventListener('click', () => {
      showToolView('Ready');
    });

    myWorkBtn.addEventListener('click', async () => {
      try {
        await openMyWorkPage();
      } catch (error) {
        myWorkView.hidden = false;
        myWorkView.innerHTML = `<div class="live-map-error">${escapeHtml(error.message || 'My Work failed.')}</div>`;
        setStatus('My Work failed', false);
      }
    });

    todaysPaddleBtn.addEventListener('click', async () => {
      try {
        await openTodaysPaddlePage();
      } catch (error) {
        todaysPaddleView.hidden = false;
        todaysPaddleView.innerHTML = `<div class="live-map-error">${escapeHtml(error.message || "Today's Paddle failed.")}</div>`;
        setStatus("Today's paddle failed", false);
      }
    });

    liveMapBtn.addEventListener('click', async () => {
      try {
        await openLiveMap();
      } catch (error) {
        liveMapView.hidden = false;
        liveMapView.innerHTML = `<div class="live-map-error">${escapeHtml(error.message || 'Live Map failed.')}</div>`;
        setStatus('Map failed', false);
      }
    });

    todayBoardBtn.addEventListener('click', async () => {
      try {
        await openTodayBoard();
      } catch (error) {
        todayBoardView.hidden = false;
        todayBoardView.innerHTML = `<div class="live-map-error">${escapeHtml(error.message || 'Today Board failed.')}</div>`;
        setStatus('Board failed', false);
      }
    });

    accountBtn.addEventListener('click', () => {
      openAccountModal();
    });

    closePaddleBtn.addEventListener('click', closePaddleModal);
    jumpToCurrentBtn.addEventListener('click', jumpToCurrentPaddlePosition);
    closeAccountBtn.addEventListener('click', closeAccountModal);
    paddleOverlay.addEventListener('click', (event) => {
      if (event.target === paddleOverlay) closePaddleModal();
    });
    accountOverlay.addEventListener('click', (event) => {
      if (event.target === accountOverlay) closeAccountModal();
    });

    refreshCountdowns();
    setInterval(refreshCountdowns, 1000);
    initSupabase();

    document.addEventListener('click', async (event) => {
      const exitLiveMapBtn = event.target.closest('[data-exit-live-map]');
      if (exitLiveMapBtn) {
        exitLiveMap();
        return;
      }

      const zoomBtn = event.target.closest('[data-map-zoom]');
      if (zoomBtn) {
        const action = zoomBtn.dataset.mapZoom;
        if (action === 'in') setLiveMapZoom(liveMapZoom + 0.15);
        if (action === 'out') setLiveMapZoom(liveMapZoom - 0.15);
        if (action === 'fit') {
          pendingLiveMapZoomAnchor = null;
          liveMapZoom = 1;
          if (latestLiveMapData) {
            renderLiveMap(latestLiveMapData);
            const scroll = liveMapView.querySelector('.mimic-scroll');
            if (scroll) scroll.scrollLeft = 0;
          }
        }
        return;
      }

      const inlinePaddleJumpBtn = event.target.closest('[data-inline-paddle-jump]');
      if (inlinePaddleJumpBtn) {
        handleInlinePaddleJump(inlinePaddleJumpBtn);
        return;
      }

      const openPaddleBtn = event.target.closest('[data-open-paddle]');
      if (openPaddleBtn) {
        try {
          await openPaddle(openPaddleBtn.dataset.openPaddle, openPaddleBtn.dataset.day || '');
        } catch (error) {
          addMessage(error.message || 'Paddle lookup failed.');
          setStatus('Lookup failed', false);
        }
        return;
      }

      const openAccountModalBtn = event.target.closest('[data-open-account-modal]');
      if (openAccountModalBtn) {
        openAccountModal();
        return;
      }

      const saveTodaysPaddleBtn = event.target.closest('[data-save-todays-paddle]');
      if (saveTodaysPaddleBtn) {
        const paddleId = saveTodaysPaddleBtn.dataset.saveTodaysPaddle || '';
        const serviceDay = saveTodaysPaddleBtn.dataset.day || '';
        if (currentLookup && currentLookup.paddleId === paddleId && currentLookup.serviceDay === serviceDay) {
          saveToTodaysPaddle(currentLookup);
          addPaddleCard(currentLookup);
          setStatus("Saved to today's paddle", true);
        }
        return;
      }

      const addMyWorkDayBtn = event.target.closest('[data-add-my-work-day]');
      if (addMyWorkDayBtn) {
        const serviceDay = addMyWorkDayBtn.dataset.addMyWorkDay || '';
        const input = document.getElementById(`${serviceDay}PaddleInput`);
        const result = addPaddleToMyWorkDraft(serviceDay, input?.value || '');
        if (!result.ok) {
          setStatus(result.error, false);
          return;
        }
        await renderMyWorkPage();
        setStatus('Paddle added to My Work', true);
        return;
      }

      const removeMyWorkDraftBtn = event.target.closest('[data-remove-my-work-draft]');
      if (removeMyWorkDraftBtn) {
        removePaddleFromMyWorkDraft(removeMyWorkDraftBtn.dataset.day || '', removeMyWorkDraftBtn.dataset.removeMyWorkDraft || '');
        await renderMyWorkPage();
        setStatus('Paddle removed from My Work', true);
        return;
      }

      const saveMyWorkDraftBtn = event.target.closest('#saveMyWorkDraftBtn');
      if (saveMyWorkDraftBtn) {
        const result = await saveMyWorkDraft();
        if (!result.ok) {
          setStatus(result.error || 'Could not save work.', false);
          return;
        }
        await renderMyWorkPage();
        setStatus('My Work saved', true);
        return;
      }

      const saveMyWorkBtn = event.target.closest('[data-save-my-work]');
      if (saveMyWorkBtn) {
        const paddleId = saveMyWorkBtn.dataset.saveMyWork || '';
        const serviceDay = saveMyWorkBtn.dataset.day || '';
        const saved = await savePaddleToMyWork(paddleId, serviceDay);
        if (saved) {
          if (currentLookup && currentLookup.paddleId === paddleId && currentLookup.serviceDay === serviceDay && !chat.hidden) {
            addPaddleCard(currentLookup);
          }
          if (!todaysPaddleView.hidden) {
            await renderTodaysPaddlePage();
          }
          if (!myWorkView.hidden) {
            await renderMyWorkPage();
          }
        }
        return;
      }

      const removeTodaysPaddleBtn = event.target.closest('[data-remove-todays-paddle]');
      if (removeTodaysPaddleBtn) {
        removeFromTodaysPaddle(removeTodaysPaddleBtn.dataset.removeTodaysPaddle || '', removeTodaysPaddleBtn.dataset.day || '');
        await renderTodaysPaddlePage();
        setStatus("Removed from today's paddle", true);
        return;
      }

      const removeMyWorkBtn = event.target.closest('[data-remove-my-work]');
      if (removeMyWorkBtn) {
        await removePaddleFromMyWork(removeMyWorkBtn.dataset.removeMyWork || '', removeMyWorkBtn.dataset.day || '');
        if (!myWorkView.hidden) {
          await renderMyWorkPage();
        }
        if (!todaysPaddleView.hidden) {
          await renderTodaysPaddlePage();
        }
        if (currentLookup && !chat.hidden) {
          addPaddleCard(currentLookup);
        }
        return;
      }

    });

    liveMapView.addEventListener('click', (event) => {
      if (event.target.closest('[data-exit-live-map]')) {
        event.stopPropagation();
        exitLiveMap();
      }
    });
  </script>
</body>
</html>
